<!DOCTYPE html>
<html lang="en" class="no-js">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
{% if page.title %}
{{ page.title }} | {{ site.title }}
{% else %}
{{ site.title }}
{% endif %}
</title>

<meta name="description" content="{{ page.description | default: site.description }}">

{% seo %}

<!-- Performance -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

<!-- Styles -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<meta name="theme-color" content="#c0c0c0">

<!-- Prevent Flash of Wrong Theme -->
<script>
(function() {
try {
const stored = localStorage.getItem("dark-mode");
if (stored === "true") {
document.documentElement.classList.add("dark-mode");
}
} catch(e) {}
})();
</script>

<!-- Optional scanline disable -->
{% unless site.win98.scanlines %}
<style>
:root { --scanline-opacity: 0; }
</style>
{% endunless %}

<!-- Reduced motion -->
<style>
@media (prefers-reduced-motion: reduce) {
* {
animation: none !important;
transition: none !important;
scroll-behavior: auto !important;
}
}
</style>

<script>
document.documentElement.classList.remove("no-js");
</script>

</head>

<body>

<a href="#content" class="skip-link">Skip to content</a>

<div id="particles-js" aria-hidden="true"></div>

<header class="site-header">

<nav class="nav-links" aria-label="Main navigation">

<a href="{{ '/' | relative_url }}" class="win98-button">Home</a>

<a href="{{ '/about.html' | relative_url }}" class="win98-button">About</a>

<a href="{{ '/projects.html' | relative_url }}" class="win98-button">Projects</a>

<a href="{{ '/blog.html' | relative_url }}" class="win98-button">Blog</a>

<a href="{{ '/contact.html' | relative_url }}" class="win98-button">Contact</a>

<a href="https://github.com/UncleRazavi"
target="_blank"
rel="noopener noreferrer"
class="win98-button">
GitHub
</a>

<button
id="dark-mode-toggle"
class="win98-button"
aria-label="Toggle dark mode"
aria-pressed="false">
🌙
</button>

</nav>

</header>

<main id="content" role="main">
{{ content }}
</main>

<footer class="site-footer">

<p>
© {{ "now" | date: "%Y" }} Hossein Razavi
</p>

<p class="muted">
Electrical Engineering • Signal Processing • AI • FPGA Design
</p>

<div class="footer-links">

<a href="{{ '/' | relative_url }}" class="win98-button">Home</a>
<a href="{{ '/projects.html' | relative_url }}" class="win98-button">Projects</a>
<a href="{{ '/blog.html' | relative_url }}" class="win98-button">Blog</a>
<a href="{{ '/contact.html' | relative_url }}" class="win98-button">Contact</a>

<a href="https://github.com/UncleRazavi"
target="_blank"
rel="noopener noreferrer"
class="win98-button">
GitHub
</a>

</div>

</footer>

<!-- Libraries -->
<script defer src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>

<!-- Main Script -->
<script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
