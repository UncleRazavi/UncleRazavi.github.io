<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<link rel="stylesheet" href="main.css">

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- particles.js -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script src="main.js" defer></script>

</head>

<body>

<button id="dark-mode-toggle">🌙 Dark Mode</button>

<div id="particles-js"></div>

<div class="window">
<div class="window-title">3D Avatar</div>
<div class="window-content">
<div id="avatar-3d"></div>
</div>
</div>

<div class="window">
<div class="window-title">Typewriter</div>
<div class="window-content">
<h2 id="typewriter"></h2>
</div>
</div>

<div class="window">
<div class="window-title">Clock</div>
<div class="window-content">
<div id="clock"></div>
</div>
</div>

<div class="window">
<div class="window-title">Signal Scope</div>
<div class="window-content">
<canvas id="signalCanvas" width="400" height="200"></canvas>
</div>
</div>

<div class="window">
<div class="window-title">Lorenz Attractor</div>
<div class="window-content">
<canvas id="lorenzCanvas" width="400" height="300"></canvas>
</div>
</div>

</body>
</html>
