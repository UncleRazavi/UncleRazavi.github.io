<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hossein Razavi - Engineering Portfolio</title>

    <!-- Optional font (clean engineering look) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #0e0e12;
            color: #e6e6e6;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #151521;
            position: sticky;
            top: 0;
        }

        button {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            background: #2b2b40;
            color: white;
            border-radius: 6px;
        }

        .section {
            padding: 40px 20px;
        }

        canvas {
            background: #111;
            border-radius: 8px;
            margin: 10px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: #151521;
            padding: 15px;
            border-radius: 10px;
        }

        #scrollTopBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
        }

        .dark-mode {
            background: #f5f5f5;
            color: #111;
        }

        .dark-mode header {
            background: #ddd;
        }

        .dark-mode .card {
            background: #fff;
        }
    </style>

    <!-- Three.js (required by your JS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<header>
    <div>
        <h2>Hossein Razavi</h2>
        <div id="clock">00:00</div>
    </div>

    <div>
        <button id="dark-mode-toggle" style="display:none;">Dark Mode</button>
    </div>
</header>

<!-- HERO -->
<section class="section">
    <h1 id="typewriter">Engineering. Signal Processing. Systems.</h1>
</section>

<!-- 3D AVATAR -->
<section class="section card">
    <h3>3D Avatar</h3>
    <div id="avatar-3d" style="width:300px;height:300px;"></div>
</section>

<!-- DSP LAB -->
<section class="section">
    <h2>DSP Lab</h2>

    <label>Frequency</label>
    <input id="freqSlider" type="range" min="1" max="20" value="5">

    <label>Noise</label>
    <input id="noiseSlider" type="range" min="0" max="1" step="0.01" value="0.2">

    <div class="grid">
        <canvas id="scopeCanvas" width="400" height="200"></canvas>
        <canvas id="fftCanvas" width="400" height="200"></canvas>
    </div>
</section>

<!-- SIGNAL SYSTEMS -->
<section class="section">
    <h2>Signal Visualizations</h2>

    <div class="grid">
        <canvas id="signalCanvas" width="400" height="200"></canvas>
        <canvas id="lorenzCanvas" width="400" height="200"></canvas>
        <canvas id="micFFT" width="400" height="200"></canvas>
        <canvas id="spectrogram" width="400" height="200"></canvas>
    </div>
</section>

<!-- BODE PLOT -->
<section class="section card">
    <h2>Bode Plot</h2>

    <label>Cutoff Frequency</label>
    <input id="cutoffSlider" type="range" min="5" max="200" value="50">

    <select id="filterType">
        <option value="lowpass">Low Pass</option>
        <option value="highpass">High Pass</option>
    </select>

    <canvas id="bodeCanvas" width="600" height="250"></canvas>
</section>

<!-- CURVES -->
<section class="section">
    <h2>Mathematical Curves</h2>

    <div class="grid">
        <canvas id="lissajous-canvas" width="250" height="250"></canvas>
        <canvas id="rose-canvas" width="250" height="250"></canvas>
        <canvas id="butterfly-canvas" width="250" height="250"></canvas>
        <canvas id="spirograph-canvas" width="250" height="250"></canvas>
    </div>
</section>

<!-- FRACTAL -->
<section class="section card">
    <h2>Mandelbrot Set</h2>
    <canvas id="fractalCanvas" width="500" height="300"></canvas>
</section>

<!-- SCROLL TOP -->
<button id="scrollTopBtn">Top</button>

<!-- YOUR SCRIPT -->
<script src="main.js"></script>

</body>
</html>
