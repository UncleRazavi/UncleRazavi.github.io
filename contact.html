<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hossein Razavi</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="assets/js/main.js" defer></script></head>
<body>
    <header role="navigation">
        <nav class="nav-links">
            <a href="index.html" class="win98-button"> Home</a>
            <a href="about.html" class="win98-button"> About</a>
            <a href="projects.html" class="win98-button"> Projects</a>
            <button class="win98-button active" disabled>Contact</button>
        </nav>
    </header>

    <main class="container">
        <section class="win98-window">
            <div class="window-title">
                <span class="title-text">Contact_Information.txt</span>
                <div class="window-controls">
                    <button class="window-control">_</button>
                    <button class="window-control">□</button>
                    <button class="window-control">×</button>
                </div>
            </div>
            <div class="window-content">
                <h2>Get In Touch</h2>
                <ul class="spec-list">
                    <li><a href="mailto:gildedmath@gmail.com"> gildedmath@gmail.com</a></li>
                    <li><a href="#" target="_blank">LinkedIn</a></li>
                    <li><a href="#" target="_blank"> GitHub</a></li>
                    <li><a href="#" target="_blank"> ORCID</a></li>
                </ul>
            </div>
        </section>

        <section class="win98-window">
            <div class="window-title">
                <span class="title-text">Send_Message.exe</span>
                <div class="window-controls">
                    <button class="window-control">_</button>
                    <button class="window-control">□</button>
                    <button class="window-control">×</button>
                </div>
            </div>
            <div class="window-content">
                <form action="https://formspree.io/f/xovnonv" method="POST" class="controls">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject" required>
                    
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                    
                    <span></span> 
                    <button type="submit" class="win98-button accent"> Send Message</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
